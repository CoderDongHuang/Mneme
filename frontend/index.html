<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mneme 学习助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h2>Mneme</h2>
                <button id="new-chat-btn" class="new-chat-btn">+ 新对话</button>
            </div>
            <div class="sidebar-content">
                <div class="section">
                    <h3>历史对话</h3>
                    <div id="session-list">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 主聊天区域 -->
        <div id="main">
            <div id="chat-header">
                <h3>学习助手</h3>
            </div>
            <div id="messages"></div>
            <div id="input-area">
                <textarea id="user-input" placeholder="输入问题..." rows="1"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
