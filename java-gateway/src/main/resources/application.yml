server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mneme?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

mneme:
  python-agent-url: ${PYTHON_AGENT_URL:http://localhost:8000}
  jwt-secret: ${JWT_SECRET:your-secret-key-change-in-production}
  jwt-expiration: ${JWT_EXPIRATION:86400000}